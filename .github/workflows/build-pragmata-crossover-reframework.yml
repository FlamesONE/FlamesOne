name: Build PRAGMATA CrossOver REFramework

on:
  push:
    paths:
      - .github/workflows/build-pragmata-crossover-reframework.yml
      - .github/patches/pragmata-crossover-reframework.patch
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout trigger repository
        uses: actions/checkout@v4

      - name: Clone REFramework
        shell: pwsh
        run: |
          git clone --recursive https://github.com/praydog/REFramework.git source
          git -C source checkout c4b1314820d20255febf7834903e8cedb669b49c
          git -C source submodule update --init --recursive

      - name: Apply PRAGMATA CrossOver patch
        shell: pwsh
        run: git -C source apply "$env:GITHUB_WORKSPACE/.github/patches/pragmata-crossover-reframework.patch"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S "$env:GITHUB_WORKSPACE/source" `
            -B "$env:GITHUB_WORKSPACE/source/build" `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DDEVELOPER_MODE=ON `
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Build REFramework
        shell: pwsh
        run: cmake --build "$env:GITHUB_WORKSPACE/source/build" --config Release --target REFramework

      - name: Package PRAGMATA artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/artifact"
          Copy-Item "$env:GITHUB_WORKSPACE/source/build/bin/REFramework/dinput8.dll" "$env:GITHUB_WORKSPACE/artifact/dinput8.dll"
          "pragmata-crossover-c4b1314" | Out-File -Encoding ascii "$env:GITHUB_WORKSPACE/artifact/reframework_revision.txt"
          @"
          Graphics_UltrawideFix=true
          Graphics_UltrawideFixVerticalFOV_V2=true
          Graphics_UltrawideCustomFOV=false
          Graphics_UltrawideFOVMultiplier_V2=1.000000
          Graphics_UltrawideConstrainUI=false
          Graphics_UltrawideConstrainChildUI=false
          LooseFileLoader_Enabled=false
          LooseFileLoader_LogAccessedFiles=false
          LooseFileLoader_LogLooseFiles=false
          FaultyFileDetector_Enabled=false
          IntegrityCheckBypass_LoadPakDirectory=false
          REFrameworkConfig_MenuKey_V2=45
          REFrameworkConfig_MenuOpen=false
          REFrameworkConfig_RememberMenuState=true
          "@ | Out-File -Encoding ascii "$env:GITHUB_WORKSPACE/artifact/re2_fw_config.txt"
          Compress-Archive -Force -Path "$env:GITHUB_WORKSPACE/artifact/*" -DestinationPath "$env:GITHUB_WORKSPACE/pragmata-crossover-reframework.zip"

      - name: Upload PRAGMATA artifact
        uses: actions/upload-artifact@v4
        with:
          name: pragmata-crossover-reframework
          path: pragmata-crossover-reframework.zip
          if-no-files-found: error
